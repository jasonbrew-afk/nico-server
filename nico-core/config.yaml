# Nico Trading Strategy Configuration (DCA Only)
strategy:
  name: "Red Day DCA"
  author: "Nico Team"
  lookback_window: 20
  bull_threshold: 5.0
  bear_threshold: 5.0

risk:
  max_drawdown_pct: 15.0
  max_concurrent_positions: 12
  min_sharpe_score: 1.0
  target_return_30d_pct: 20.0

dca:
  budget: 1500.0
  currency: USD
  assets: ["BTC/USD", "ETH/USD", "SPY"]  # Alpaca tickers (crypto uses / not -)
  max_triggers: 30
  trigger_threshold: -0.015  # Buy if daily return < -1.5% (slightly more sensitive)
  allocation_per_asset: 0.3333  # Split evenly across assets
  min_trade_usd: 5  # Minimum $5 per trade (Alpaca minimum)

alpaca:
  base_url: "https://paper-api.alpaca.markets"  # PAPER mode (safe)
  paper: true  # Set to false ONLY when you explicitly confirm live
